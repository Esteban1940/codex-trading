version: "3.9"
services:
  bot:
    image: node:20-bookworm
    container_name: codex-trading-bot
    working_dir: /app
    command: >
      bash -lc "corepack enable &&
      pnpm install --frozen-lockfile &&
      pnpm dev:worker"
    env_file:
      - .env
    volumes:
      - ./:/app
    restart: unless-stopped
    logging:
      options:
        max-size: "10m"
        max-file: "5"

  api:
    image: node:20-bookworm
    container_name: codex-trading-api
    working_dir: /app
    command: >
      bash -lc "corepack enable &&
      pnpm install --frozen-lockfile &&
      pnpm dev:api"
    env_file:
      - .env
    volumes:
      - ./:/app
    ports:
      - "3000:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      options:
        max-size: "10m"
        max-file: "5"

  watchdog:
    image: node:20-bookworm
    container_name: codex-trading-watchdog
    working_dir: /app
    command: >
      bash -lc "while true; do ./scripts/worker-watchdog.sh; sleep 60; done"
    env_file:
      - .env
    volumes:
      - ./:/app
    restart: unless-stopped
    depends_on:
      - bot
    logging:
      options:
        max-size: "10m"
        max-file: "5"

  postgres:
    image: postgres:17
    container_name: codex-trading-postgres
    environment:
      POSTGRES_USER: trader
      POSTGRES_PASSWORD: trader
      POSTGRES_DB: trading
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    logging:
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  postgres_data:
